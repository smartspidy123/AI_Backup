# ==============================================================================
# Centaur-Jarvis CLI Configuration
# ==============================================================================

# --- Scan Profiles ---
profiles:
  quick:
    description: "Fast reconnaissance-only scan"
    phases: ["recon"]
    recon_tasks: ["nuclei"]
    fuzzing:
      enabled: false
    sniper:
      enabled: false
    timeout_minutes: 15

  full:
    description: "Comprehensive multi-phase scan"
    phases: ["recon", "fuzzing", "sniper"]
    recon_tasks: ["subfinder", "httpx", "nuclei", "nmap", "katana"]
    fuzzing:
      enabled: true
      vuln_types: ["xss", "sqli", "ssti", "ssrf", "lfi"]
      max_iterations: 3
      timeout_per_param: 120
    sniper:
      enabled: true
      feeds: ["github", "packetstorm", "exploitdb"]
      auto_verify: true
    timeout_minutes: 120

  recon_only:
    description: "Deep reconnaissance without active testing"
    phases: ["recon"]
    recon_tasks: ["subfinder", "httpx", "nuclei", "nmap", "katana", "wafw00f"]
    fuzzing:
      enabled: false
    sniper:
      enabled: false
    timeout_minutes: 30

  custom:
    description: "User-configurable profile (override via CLI flags)"
    phases: ["recon"]
    recon_tasks: ["nuclei"]
    fuzzing:
      enabled: false
    sniper:
      enabled: false
    timeout_minutes: 60

# --- Display Settings ---
display:
  refresh_interval: 2          # Dashboard refresh rate in seconds
  max_events: 50               # Maximum events shown in live feed
  max_activities: 8            # Maximum concurrent activities shown
  max_errors: 20               # Maximum errors shown in error panel
  show_tool_summaries: true    # Show aggregated tool statistics
  show_queue_status: true      # Show Redis queue lengths
  error_panel: true            # Show dedicated error panel
  verbose: false               # Verbose event output
  hacker_theme: true           # Green/cyan/red color scheme
  show_banner: true            # Show ASCII art banner on start
  spinner_style: "dots"        # Rich spinner style

# --- Redis Connection ---
redis:
  host: "127.0.0.1"
  port: 6379
  db: 0
  password: null
  socket_timeout: 5
  retry_on_timeout: true
  max_retries: 3
  retry_delay: 2

# --- Process Management ---
processes:
  orchestrator:
    module: "modules.orchestrator.main"
    required: true
    restart_on_crash: true
    max_restarts: 3
  recon_worker:
    module: "modules.recon.worker"
    required: true
    restart_on_crash: true
    max_restarts: 3
  fuzzer_worker:
    module: "modules.fuzzer.worker"
    required: false
    restart_on_crash: true
    max_restarts: 3
  sniper_worker:
    module: "modules.sniper.worker"
    required: false
    restart_on_crash: true
    max_restarts: 3

# --- State Management ---
state:
  save_directory: ".jarvis_state"
  auto_save_interval: 30       # seconds between auto-saves
  max_state_files: 20          # keep last N state files
  fallback_directory: "/tmp/jarvis_state"

# --- Notifications (Future) ---
notifications:
  enabled: false
  webhook_url: null
  notify_on: ["critical_finding", "scan_complete", "scan_error"]

# --- Logging ---
logging:
  level: "INFO"
  file: "logs/cli.log"
  max_size_mb: 50
  backup_count: 5
